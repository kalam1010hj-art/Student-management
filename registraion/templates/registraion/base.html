<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Dashboard{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    {% block style %}{% endblock style %}

    <style>
        body {
            background-color: #f5f6fa;
        }

        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .content {
            padding: 20px;
        }
    </style>

</head>
<body>

<!-- Navbar -->
<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <a class="navbar-brand" href="#">Student Dashboard</a>


</nav>


<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">

            <h5>Menu</h5>
            <hr>

            <a href="{% url 'home-page' %}">🏠 Home</a>
            <a href="{% url 'add-student' %}">➕ Add Student</a>
            <a href="{% url 'view-student' %}">📋 View Students</a>
            
            <hr>
     <form method="POST" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-sm mt-3" onclick='return confirm("Are you sure?")'>
        🚪 Logout
    </button>
</form>



        </div>


        <!-- Main Content -->
        <div class="col-md-10 content">

            {% block content %}
            <!-- Page Content Goes Here -->
            {% endblock %}

        </div>

    </div>
</div>


</body>
</html>
